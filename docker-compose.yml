version: '3.8'

services:
  # MySQL Database (Local dev only)
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ats_db
      MYSQL_USER: ats_user
      MYSQL_PASSWORD: ats_password
    ports:
      - "3306:3306" # Expose so you can connect from standard DB clients locally
    volumes:
      - db_data:/var/lib/mysql

  # FastAPI Backend
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000" # Mapped to 8000 since frontend expects localhost:8000
    environment:
      - DATABASE_URL=mysql+pymysql://ats_user:ats_password@db:3306/ats_db
      - JWT_SECRET_KEY=dev_secret_key_123 # Change for production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - db

  # React + Vite Frontend
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:80" # Map host's port 3000 to Nginx container's port 80
    depends_on:
      - backend

volumes:
  db_data:
